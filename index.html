<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>BugFlow Tracker | Joel Foster</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="top-bar">
        <div>
          <p class="eyebrow">BugFlow Tracker</p>
          <h1>Track Bugs and Issues</h1>
          <p>Log bugs, assign priority, update status, filter issues, and save everything locally.</p>
        </div>

        <div class="theme-control">
          <label for="themeSelect">Theme</label>
          <select id="themeSelect">
            <option value="clean">Clean Dashboard</option>
            <option value="terminal">Dev Terminal</option>
            <option value="focus">Focus Mode</option>
            <option value="cyber">Cyber Debug</option>
            <option value="warm">Warm Desk</option>
          </select>
        </div>
      </div>
    </section>

    <section class="stats-grid">
      <div class="stat-card">
        <p>Total Issues</p>
        <h2 id="totalCount">0</h2>
      </div>

      <div class="stat-card">
        <p>Open</p>
        <h2 id="openCount">0</h2>
      </div>

      <div class="stat-card">
        <p>In Progress</p>
        <h2 id="progressCount">0</h2>
      </div>

      <div class="stat-card">
        <p>Fixed</p>
        <h2 id="fixedCount">0</h2>
      </div>
    </section>

    <section class="tracker-layout">
      <form id="bugForm" class="bug-form">
        <h2>Add Issue</h2>

        <label for="projectInput">Project Name</label>
        <input type="text" id="projectInput" placeholder="Example: Movie Search App" required />

        <label for="titleInput">Issue Title</label>
        <input type="text" id="titleInput" placeholder="Example: Search button not working" required />

        <label for="priorityInput">Priority</label>
        <select id="priorityInput">
          <option value="Low">Low</option>
          <option value="Medium" selected>Medium</option>
          <option value="High">High</option>
          <option value="Critical">Critical</option>
        </select>

        <label for="statusInput">Status</label>
        <select id="statusInput">
          <option value="Backlog">Backlog</option>
          <option value="Open" selected>Open</option>
          <option value="In Progress">In Progress</option>
          <option value="Testing">Testing</option>
          <option value="Fixed">Fixed</option>
          <option value="Closed">Closed</option>
        </select>

        <label for="dateInput">Date Found</label>
        <input type="date" id="dateInput" />

        <label for="timeInput">Time Found</label>
        <input type="time" id="timeInput" />

        <label for="locationInput">Location Affected</label>
        <input type="text" id="locationInput" placeholder="Example: Search form, mobile layout, movie card" />

        <label for="notesInput">Notes</label>
        <textarea id="notesInput" placeholder="Example: Happens after clicking search with an empty input. Need to validate form."></textarea>

        <button type="submit">Add Issue</button>
      </form>

      <section class="issues-panel">
        <div class="panel-header">
          <div>
            <h2>Issues</h2>
            <p id="listMessage">No issues yet.</p>
          </div>

          <button id="clearAllButton" class="danger-button" type="button">Clear All</button>
        </div>

        <div class="filters">
          <input type="text" id="searchInput" placeholder="Search project, issue, or location" />

          <select id="filterStatus">
            <option value="All">All Statuses</option>
            <option value="Backlog">Backlog</option>
            <option value="Open">Open</option>
            <option value="In Progress">In Progress</option>
            <option value="Testing">Testing</option>
            <option value="Fixed">Fixed</option>
            <option value="Closed">Closed</option>
          </select>

          <select id="filterPriority">
            <option value="All">All Priorities</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
            <option value="Critical">Critical</option>
          </select>
        </div>

        <div id="issuesList" class="issues-list"></div>

        <div id="emptyState" class="empty-state">
          <h3>No issues found</h3>
          <p>Add your first bug or adjust your filters.</p>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
